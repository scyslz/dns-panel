name: Build Docker Image and Upload to Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # =========================
      # Build amd64
      # =========================
      - name: Build amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t dns-panel:${{ github.event.inputs.version }}-amd64 \
            --output type=docker \
            .

          docker save dns-panel:${{ github.event.inputs.version }}-amd64 \
            | gzip > dns-panel-${{ github.event.inputs.version }}-amd64.tar.gz

      # =========================
      # Build arm64
      # =========================
      - name: Build arm64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t dns-panel:${{ github.event.inputs.version }}-arm64 \
            --output type=docker \
            .

          docker save dns-panel:${{ github.event.inputs.version }}-arm64 \
            | gzip > dns-panel-${{ github.event.inputs.version }}-arm64.tar.gz

      # =========================
      # Create Release (version tag)
      # =========================
      - name: Create Version Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            dns-panel-${{ github.event.inputs.version }}-amd64.tar.gz
            dns-panel-${{ github.event.inputs.version }}-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Create / Update latest tag
      # =========================
      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: |
            dns-panel-${{ github.event.inputs.version }}-amd64.tar.gz
            dns-panel-${{ github.event.inputs.version }}-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
